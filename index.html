  *{margin:0;padding:0;box-sizing:border-box;}

  :root{
    --bg:#111118;

    --board-dark:#769656;
    --accent:#ff2e63;
    --accent2:#08d9d6;
    --text:#eaeaea;
    --bubble-bg:#1c1c2e;
  }

  body{
    background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden;

  }

  h1{
    font-family:'Bangers',cursive;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:3px;margin:12px 0 2px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .subtitle{font-size:0.7rem;color:#666;margin-bottom:8px;letter-spacing:2px;text-transform:uppercase;}

  .difficulty-bar{display:flex;gap:8px;margin-bottom:10px;}
  .diff-btn{
    font-family:'Bangers',cursive;font-size:0.85rem;letter-spacing:1px;padding:5px 14px;
    border:2px solid #444;background:transparent;color:#888;border-radius:4px;cursor:pointer;transition:all 0.2s;
  }
  .diff-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,46,99,0.1);}
  .diff-btn:hover{border-color:var(--accent);color:var(--accent);}

  .game-container{
    display:flex;gap:16px;align-items:flex-start;justify-content:center;
    padding:0 10px;width:100%;max-width:900px;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    grid-template-rows:repeat(8,1fr);
    width:min(420px,88vw);
    aspect-ratio:1/1;
    min-height:0;
    border:3px solid var(--accent);border-radius:4px;
    box-shadow:0 0 25px rgba(255,46,99,0.15);
    flex-shrink:0;
  }

  .square{
    display:flex;align-items:center;justify-content:center;
    font-size:min(42px,8.5vw);cursor:pointer;user-select:none;
    position:relative;transition:background 0.12s;
    min-width:0;min-height:0;overflow:hidden;
  }
  .square.light{background:var(--board-light);}
  .square.dark{background:var(--board-dark);}
  .square.selected{background:#f7ec7d !important;}
  .square.legal-move::after{
    content:'';width:30%;height:30%;background:rgba(0,0,0,0.2);border-radius:50%;position:absolute;
  }
  .square.legal-capture{background:rgba(255,46,99,0.5) !important;}
  .square.last-light{background:#f7ec7d !important;}
  .square.last-dark{background:#baca44 !important;}

  .trash-panel{
    flex:1;min-width:0;max-height:min(420px,88vw);overflow-y:auto;
    display:flex;flex-direction:column;gap:8px;padding:6px;
  }
  .trash-bubble{
    background:var(--bubble-bg);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;
    padding:10px 14px;font-size:0.85rem;line-height:1.5;animation:slideIn 0.3s ease-out;
  }
  .trash-bubble .cpu-label{
    font-family:'Bangers',cursive;color:var(--accent);font-size:0.7rem;letter-spacing:2px;margin-bottom:3px;
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}

  .status-bar{margin:8px 0;font-family:'Bangers',cursive;font-size:1.1rem;letter-spacing:1px;min-height:26px;color:var(--accent2);}
  .controls{display:flex;gap:10px;margin-bottom:15px;}
  .ctrl-btn{
    font-family:'Bangers',cursive;font-size:0.95rem;letter-spacing:1px;padding:6px 16px;
    border:2px solid var(--accent);background:transparent;color:var(--accent);border-radius:4px;cursor:pointer;transition:all 0.2s;
  }
  .ctrl-btn:hover{background:var(--accent);color:var(--bg);}

  .thinking{color:#666;font-style:italic;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .game-over-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.4s;padding:20px;
    overflow-y:auto;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .game-over-overlay h2{font-family:'Bangers',cursive;font-size:clamp(2rem,6vw,3.5rem);color:var(--accent);margin-bottom:10px;text-align:center;}
  .game-over-overlay .go-body{font-size:0.95rem;margin-bottom:20px;max-width:600px;text-align:center;line-height:1.8;padding:0 10px;white-space:pre-line;}
  .game-over-overlay button{
    font-family:'Bangers',cursive;font-size:1rem;padding:8px 24px;border:2px solid var(--accent);
    background:transparent;color:var(--accent);border-radius:4px;cursor:pointer;transition:all 0.2s;
  }
  .game-over-overlay button:hover{background:var(--accent);color:var(--bg);}

  @media(max-width:700px){
    .game-container{flex-direction:column;align-items:center;}
    .trash-panel{max-height:200px;width:88vw;}
  }
</style>

// ======== NO-REPEAT SYSTEM ========
let usedInsults = {};

function resetUsed() {
  usedInsults = {};
  for (let k in BANKS) usedInsults[k] = [];
}

function pick(bank) {
  const arr = BANKS[bank];
  if (!arr) return "";
  let available = arr.filter((_, i) => !usedInsults[bank].includes(i));
  if (available.length === 0) {
    usedInsults[bank] = [];
    available = arr;
  }
  const idx = Math.floor(Math.random() * available.length);
  const realIdx = arr.indexOf(available[idx]);
  usedInsults[bank].push(realIdx);
  return available[idx];
}

// ======== GAME STATE ========
let game = new Chess(), sel = null, legal = [], mc = 0, lastMv = null, active = true, difficulty = 0;

function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach((b,i) => b.classList.toggle('active', i===d));
  newGame();
}

function getInsult(mv) {
  mc++;
  if (mc <= 2) return pick('open');
  if (mv && mv.captured) return game.turn()==='b' ? pick('cap_them') : pick('cap_us');
  if (mv && mv.san && mv.san.includes('+')) return pick('check');
  if (mv && mv.piece==='p' && !mv.captured) return Math.random()>0.35 ? pick('pawn') : pick('gen');
  return pick('gen');
}

function talk(t) {
  const p=document.getElementById('trash-panel'), b=document.createElement('div');
  b.className='trash-bubble';
  b.innerHTML='<div class="cpu-label">CPU \u{1F916}</div>'+t;
  p.appendChild(b); p.scrollTop=p.scrollHeight;
}

function render() {
  const el=document.getElementById('board'); el.innerHTML='';
  const bd=game.board();
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const sq=document.createElement('div'), nm='abcdefgh'[c]+(8-r);
    const isLight=(r+c)%2===0;
    sq.className='square '+(isLight?'light':'dark');
    if(sel===nm) sq.classList.add('selected');
    if(lastMv){
      if(lastMv.from===nm) sq.classList.add(isLight?'last-light':'last-dark');
      if(lastMv.to===nm) sq.classList.add(isLight?'last-light':'last-dark');
    }
    if(sel&&legal.includes(nm)){
      bd[r][c]?sq.classList.add('legal-capture'):sq.classList.add('legal-move');
    }
    const pc=bd[r][c];
    if(pc){
      const key = pc.color+pc.type.toUpperCase();
      sq.textContent=PIECES[key]||'';
      sq.style.color = pc.color==='w' ? '#FFFFFF' : '#1a1a1a';
      sq.style.textShadow = pc.color==='w'
        ? '0 0 2px rgba(0,0,0,0.6), 0 1px 3px rgba(0,0,0,0.4)'
        : '0 0 2px rgba(0,0,0,0.2)';
    }
    sq.addEventListener('click',function(){onClick(nm)});
    el.appendChild(sq);
  }
}

function onClick(sq) {
  if(!active||game.turn()!=='w') return;
  if(sel===sq){sel=null;legal=[];render();return;}
  if(sel&&legal.includes(sq)){
    const mp=game.get(sel); let promo;
    if(mp&&mp.type==='p'&&((mp.color==='w'&&sq[1]==='8')||(mp.color==='b'&&sq[1]==='1'))) promo='q';
    const mv=game.move({from:sel,to:sq,promotion:promo});
    if(mv){
      lastMv=mv;sel=null;legal=[];render();talk(getInsult(mv));
      if(checkEnd()) return;
      document.getElementById('status').innerHTML='<span class="thinking">CPU is calculating how to fuck you up...</span>';
      setTimeout(cpuMove, 400+Math.random()*600);
    } return;
  }
  const pc=game.get(sq);
  if(pc&&pc.color==='w'){sel=sq;legal=game.moves({square:sq,verbose:true}).map(function(m){return m.to});}
  else{sel=null;legal=[];}
  render();
}

function minimax(depth, alpha, beta, isMax) {
  if(depth===0) return evalBoard();
  const moves=game.moves();
  if(moves.length===0){
    if(game.in_checkmate()) return isMax?-99999:99999;
    return 0;
  }
  if(isMax){
    let best=-Infinity;
    for(const m of moves){
      game.move(m);
      best=Math.max(best,minimax(depth-1,alpha,beta,false));
      game.undo();
      alpha=Math.max(alpha,best);
      if(beta<=alpha) break;
    }
    return best;
  } else {
    let best=Infinity;
    for(const m of moves){
      game.move(m);
      best=Math.min(best,minimax(depth-1,alpha,beta,true));
      game.undo();
      beta=Math.min(beta,best);
      if(beta<=alpha) break;
    }
    return best;
  }
}

function cpuMove() {
  if(game.game_over()) return;
  const moves=game.moves({verbose:true});

  let chosen;

  if(difficulty===0){
    let scored=moves.map(function(m){
      let s=Math.random()*5;
      if(m.captured){const v={p:1,n:3,b:3,r:5,q:9};s+=(v[m.captured]||0)*3;}
      game.move(m.san);
      if(game.in_checkmate()) s+=100;
      if(game.in_check()) s+=2;
      game.undo();
      return{move:m,score:s};
    });
    scored.sort(function(a,b){return b.score-a.score});
    chosen=scored[Math.floor(Math.random()*Math.min(Math.max(3,Math.floor(scored.length*0.6)),scored.length))].move;
  }
  else if(difficulty===1){
    let scored=moves.map(function(m){
      game.move(m.san);
      let s=evalBoard()+Math.random()*80-40;
      if(game.in_checkmate()) s=99999;
      game.undo();
      return{move:m,score:s};
    });
    scored.sort(function(a,b){return b.score-a.score});
    chosen=scored[Math.floor(Math.random()*Math.min(3,scored.length))].move;
  }
  else {
    let best=-Infinity, bestMoves=[];
    for(const m of moves){
      game.move(m.san);
      const s=minimax(2,-Infinity,Infinity,false);
      game.undo();
      if(s>best){best=s;bestMoves=[m];}
      else if(s===best) bestMoves.push(m);
    }
    chosen=bestMoves[Math.floor(Math.random()*bestMoves.length)];
  }

  const mv=game.move(chosen.san);
  lastMv=mv; render();
  if(mv.captured) talk(getInsult(mv));
  checkEnd();
  if(active) document.getElementById('status').textContent="Your move, dipshit.";
}
