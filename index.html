var audioCtx=null;
function aud(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function sndMove(){
  var c=aud(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=600;o.type='sine';
  g.gain.setValueAtTime(.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.07);
  o.start(c.currentTime);o.stop(c.currentTime+.07);
}
function sndCapture(){
  var c=aud(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=280;o.type='sawtooth';
  g.gain.setValueAtTime(.18,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.13);
  o.start(c.currentTime);o.stop(c.currentTime+.13);
}
function sndCheck(){
  var c=aud(),t=c.currentTime;
  for(var i=0;i<3;i++){
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=i%2===0?880:660;o.type='square';
    g.gain.setValueAtTime(.12,t+i*.09);g.gain.exponentialRampToValueAtTime(.001,t+i*.09+.07);
    o.start(t+i*.09);o.stop(t+i*.09+.07);
  }
}
function sndCheckmate(){
  var c=aud(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=150;o.type='sawtooth';
  g.gain.setValueAtTime(.25,t);g.gain.linearRampToValueAtTime(.25,t+.4);
  g.gain.exponentialRampToValueAtTime(.001,t+.7);o.start(t);o.stop(t+.7);
}
function sndSadTrombone(){
  var c=aud(),notes=[293.66,277.18,261.63,196],durs=[.3,.3,.3,.7],t=c.currentTime;
  for(var i=0;i<notes.length;i++){
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.frequency.value=notes[i];o.type='triangle';
    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+durs[i]);
    o.start(t);o.stop(t+durs[i]);t+=durs[i];
  }
}
function sndTriumph(){
  var c=aud(),notes=[523.25,659.25,783.99,1046.5],t=c.currentTime;

    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
    o.start(t);o.stop(t+.22);t+=.18;
  }
}

// ======== NO-REPEAT SYSTEM ========
var usedInsults={};
function resetUsed(){usedInsults={};for(var k in BANKS) usedInsults[k]=[];}
function pick(bank){
  var arr=BANKS[bank];if(!arr||!arr.length) return "";
  if(!usedInsults[bank]) usedInsults[bank]=[];
  var avail=arr.filter(function(_,i){return usedInsults[bank].indexOf(i)===-1;});
  if(avail.length===0){usedInsults[bank]=[];avail=arr;}
  var idx=Math.floor(Math.random()*avail.length);
  var realIdx=arr.indexOf(avail[idx]);
  usedInsults[bank].push(realIdx);
  return avail[idx];
}

// ======== MATERIAL BALANCE ========
function getMaterialBalance(){
  var vals={p:1,n:3,b:3,r:5,q:9},w=0,bl=0,bd=game.board();
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var pc=bd[r][c];if(!pc||pc.type==='k') continue;
    if(pc.color==='w') w+=vals[pc.type]||0; else bl+=vals[pc.type]||0;
  }
  return w-bl;
}

// ======== CAPTURED PIECES ========
function updateCaptured(){
  var hist=game.history({verbose:true}),wLost=[],bLost=[];
  for(var i=0;i<hist.length;i++){
    var mv=hist[i];
    if(mv.captured){
      if(mv.color==='w') bLost.push(mv.captured);
      else wLost.push(mv.captured);
    }
  }
  var order={q:0,r:1,b:2,n:3,p:4};
  wLost.sort(function(a,b){return order[a]-order[b];});
  bLost.sort(function(a,b){return order[a]-order[b];});
  var wPcs='',bPcs='';
  for(var j=0;j<wLost.length;j++) wPcs+=PIECES['w'+wLost[j].toUpperCase()]||'';
  for(var j=0;j<bLost.length;j++) bPcs+=PIECES['b'+bLost[j].toUpperCase()]||'';
  var vals={p:1,n:3,b:3,r:5,q:9};
  var wVal=0,bVal=0;
  for(var j=0;j<wLost.length;j++) wVal+=vals[wLost[j]]||0;
  for(var j=0;j<bLost.length;j++) bVal+=vals[bLost[j]]||0;
  var adv=bVal-wVal,topA='',botA='';
  if(adv>0) botA=' <span class="mat-adv">+'+adv+'</span>';
  if(adv<0) topA=' <span class="mat-adv">+'+(-adv)+'</span>';
  document.getElementById('captured-top').innerHTML='<span class="cap-pieces">'+wPcs+'</span>'+topA;
  document.getElementById('captured-bottom').innerHTML='<span class="cap-pieces">'+bPcs+'</span>'+botA;
}

// ======== MOVE HISTORY ========
function updateMoveHistory(){
  var hist=game.history(),html='';
  for(var i=0;i<hist.length;i+=2){
    var num=Math.floor(i/2)+1;
    html+='<span class="move-pair"><span class="move-num">'+num+'.</span> <span class="move-san">'+hist[i]+'</span>';
    if(i+1<hist.length) html+=' <span class="move-san">'+hist[i+1]+'</span>';
    html+='</span> ';
  }
  var el=document.getElementById('move-history');
  el.innerHTML=html;el.scrollTop=el.scrollHeight;
}

// ======== IDLE TIMER ========
var idleInterval=null,idleSec=0,idleFired={};
function startIdleTimer(){
  stopIdleTimer();idleSec=0;idleFired={15:false,30:false,45:false,60:false};
  idleInterval=setInterval(function(){
    if(!active||game.turn()!=='w') return;
    idleSec++;
    if(idleSec>=60&&!idleFired[60]){idleFired[60]=true;talk(pick('idle_60'));}
    else if(idleSec>=45&&!idleFired[45]){idleFired[45]=true;talk(pick('idle_45'));}
    else if(idleSec>=30&&!idleFired[30]){idleFired[30]=true;talk(pick('idle_30'));}
    else if(idleSec>=15&&!idleFired[15]){idleFired[15]=true;talk(pick('idle_15'));}
  },1000);
}
function stopIdleTimer(){if(idleInterval){clearInterval(idleInterval);idleInterval=null;}}

// ======== GAME STATE ========
var game=new Chess(),sel=null,legal=[],mc=0,lastMv=null,active=true,difficulty=0,pendingPromo=null;

function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(function(b,i){b.classList.toggle('active',i===d);});
  updateStatsDisplay();newGame();
}

// ======== INSULT SELECTION (adaptive) ========
function getInsult(mv){
  mc++;
  if(mc<=2) return pick('open');
  if(mv&&mv.captured) return game.turn()==='b'?pick('cap_them'):pick('cap_us');
  if(mv&&mv.san&&mv.san.indexOf('+')!==-1) return pick('check');
  var bal=getMaterialBalance();
  if(bal>=5) return pick('nervous');
  if(bal>=3&&Math.random()>.4) return pick('nervous');
  if(bal<=-5) return pick('dominating');
  if(bal<=-3&&Math.random()>.5) return pick('dominating');
  if(mv&&mv.piece==='p'&&!mv.captured) return Math.random()>.35?pick('pawn'):pick('gen');
  return pick('gen');
}

function talk(t){
  if(!t) return;
  var p=document.getElementById('trash-panel'),b=document.createElement('div');
  b.className='trash-bubble';
  b.innerHTML='<div class="cpu-label">CPU \u{1F916}</div>'+t;
  p.appendChild(b);p.scrollTop=p.scrollHeight;
}

// ======== RENDERING ========
function render(){
  var el=document.getElementById('board');el.innerHTML='';
  var bd=game.board();
  var checkKingSq=null,checkingFrom=null;
  if(game.in_check()){
    var kc=game.turn();
    for(var r=0;r<8;r++) for(var c=0;c<8;c++){
      if(bd[r][c]&&bd[r][c].type==='k'&&bd[r][c].color===kc) checkKingSq='abcdefgh'[c]+(8-r);
    }
    if(lastMv&&lastMv.san&&(lastMv.san.indexOf('+')!==-1||lastMv.san.indexOf('#')!==-1)) checkingFrom=lastMv.to;
  }
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var sq=document.createElement('div'),nm='abcdefgh'[c]+(8-r);
    var isLight=(r+c)%2===0;
    sq.className='square '+(isLight?'light':'dark');
    if(sel===nm) sq.classList.add('selected');
    if(nm===checkKingSq) sq.classList.add('in-check');
    if(nm===checkingFrom) sq.classList.add('checking-piece');
    if(lastMv&&!game.in_check()){
      if(lastMv.from===nm) sq.classList.add(isLight?'last-light':'last-dark');
      if(lastMv.to===nm) sq.classList.add(isLight?'last-light':'last-dark');
    }
    if(sel&&legal.indexOf(nm)!==-1){
      bd[r][c]?sq.classList.add('legal-capture'):sq.classList.add('legal-move');
    }
    var pc=bd[r][c];
    if(pc){
      var key=pc.color+pc.type.toUpperCase();
      sq.textContent=PIECES[key]||'';
      sq.style.color=pc.color==='w'?'#FFFFFF':'#1a1a1a';
      sq.style.textShadow=pc.color==='w'?'0 0 2px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.4)':'0 0 2px rgba(0,0,0,.2)';
    }
    (function(n){sq.addEventListener('click',function(){onClick(n)});})(nm);
    el.appendChild(sq);
  }
}

// ======== PROMOTION PICKER ========
function showPromoPicker(){document.getElementById('promo-overlay').style.display='flex';}
function hidePromoPicker(){document.getElementById('promo-overlay').style.display='none';}
function doPromo(piece){
  hidePromoPicker();
  if(!pendingPromo) return;
  var wasInCheck=game.in_check();
  var mv=game.move({from:pendingPromo.from,to:pendingPromo.to,promotion:piece});
  pendingPromo=null;
  if(!mv) return;
  if(!game.game_over()){
    if(mv.san.indexOf('+')!==-1) sndCheck();
    else if(mv.captured) sndCapture();
    else sndMove();
  }
  lastMv=mv;sel=null;legal=[];render();updateMoveHistory();updateCaptured();
  if(piece!=='q') talk(pick('promo_'+piece));
  else if(mv.piece==='k'&&wasInCheck) talk(pick('panic_king'));
  else talk(getInsult(mv));
  if(checkEnd()) return;
  stopIdleTimer();
  document.getElementById('status').innerHTML='<span class="thinking">CPU is calculating how to fuck you up...</span>';
  setTimeout(cpuMove,400+Math.random()*600);
}

// ======== PLAYER INPUT ========
function onClick(sq){
  if(!active||game.turn()!=='w') return;
  stopIdleTimer();
  if(sel===sq){sel=null;legal=[];render();startIdleTimer();return;}
  if(sel&&legal.indexOf(sq)!==-1){
    var mp=game.get(sel);
    if(mp&&mp.type==='p'&&((mp.color==='w'&&sq[1]==='8')||(mp.color==='b'&&sq[1]==='1'))){
      pendingPromo={from:sel,to:sq};showPromoPicker();return;
    }
    var wasInCheck=game.in_check();
    var mv=game.move({from:sel,to:sq});
    if(mv){
      if(!game.game_over()){
        if(mv.san.indexOf('+')!==-1) sndCheck();
        else if(mv.captured) sndCapture();
        else sndMove();
      }
      lastMv=mv;sel=null;legal=[];render();updateMoveHistory();updateCaptured();
      if(mv.piece==='k'&&wasInCheck) talk(pick('panic_king'));
      else talk(getInsult(mv));
      if(checkEnd()) return;
      document.getElementById('status').innerHTML='<span class="thinking">CPU is calculating how to fuck you up...</span>';
      setTimeout(cpuMove,400+Math.random()*600);
    }
    return;
  }
  var pc=game.get(sq);
  if(pc&&pc.color==='w'){sel=sq;legal=game.moves({square:sq,verbose:true}).map(function(m){return m.to;});}
  else{sel=null;legal=[];}
  render();startIdleTimer();
}

// ======== AI ========
function evalBoard(){
  var vals={p:100,n:320,b:330,r:500,q:900,k:20000};
  var pst_p=[0,0,0,0,0,0,0,0,50,50,50,50,50,50,50,50,10,10,20,30,30,20,10,10,5,5,10,25,25,10,5,5,0,0,0,20,20,0,0,0,5,-5,-10,0,0,-10,-5,5,5,10,10,-20,-20,10,10,5,0,0,0,0,0,0,0,0];
  var pst_n=[-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50];
  var pst_b=[-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20];
  var pst_r=[0,0,0,0,0,0,0,0,5,10,10,10,10,10,10,5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,-5,0,0,0,0,0,0,-5,0,0,0,5,5,0,0,0];
  var pst_q=[-20,-10,-10,-5,-5,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,5,5,5,0,-10,-5,0,5,5,5,5,0,-5,0,0,5,5,5,5,0,-5,-10,5,5,5,5,5,0,-10,-10,0,5,0,0,0,0,-10,-20,-10,-10,-5,-5,-10,-10,-20];
  var pst_k=[-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-30,-40,-40,-50,-50,-40,-40,-30,-20,-30,-30,-40,-40,-30,-30,-20,-10,-20,-20,-20,-20,-20,-20,-10,20,20,0,0,0,0,20,20,20,30,10,0,0,10,30,20];
  var psts={p:pst_p,n:pst_n,b:pst_b,r:pst_r,q:pst_q,k:pst_k};
  var score=0,bd=game.board();
  for(var r=0;r<8;r++) for(var c=0;c<8;c++){
    var pc=bd[r][c];if(!pc) continue;
    var idx=r*8+c,fidx=(7-r)*8+c,v=vals[pc.type]||0,pst=psts[pc.type];
    if(pc.color==='w'){score-=v;if(pst) score-=pst[fidx];}
    else{score+=v;if(pst) score+=pst[idx];}
  }
  return score;
}

function minimax(depth,alpha,beta,isMax){
  if(depth===0) return evalBoard();
  var moves=game.moves();
  if(moves.length===0){if(game.in_checkmate()) return isMax?-99999:99999;return 0;}
  if(isMax){
    var best=-Infinity;
    for(var i=0;i<moves.length;i++){
      game.move(moves[i]);best=Math.max(best,minimax(depth-1,alpha,beta,false));game.undo();
      alpha=Math.max(alpha,best);if(beta<=alpha) break;
    }return best;
  }else{
    var best=Infinity;
    for(var i=0;i<moves.length;i++){
      game.move(moves[i]);best=Math.min(best,minimax(depth-1,alpha,beta,true));game.undo();
      beta=Math.min(beta,best);if(beta<=alpha) break;
    }return best;
  }
}

function cpuMove(){
  if(game.game_over()) return;
  var moves=game.moves({verbose:true});if(!moves.length) return;
  var chosen;
  if(difficulty===0){
    var scored=moves.map(function(m){
      var s=Math.random()*5;
      if(m.captured){var v={p:1,n:3,b:3,r:5,q:9};s+=(v[m.captured]||0)*3;}
      game.move(m.san);if(game.in_checkmate()) s+=100;if(game.in_check()) s+=2;game.undo();
      return{move:m,score:s};
    });
    scored.sort(function(a,b){return b.score-a.score;});
    chosen=scored[Math.floor(Math.random()*Math.min(Math.max(3,Math.floor(scored.length*.6)),scored.length))].move;
  }else if(difficulty===1){
    var scored=moves.map(function(m){
      game.move(m.san);var s=evalBoard()+Math.random()*80-40;if(game.in_checkmate()) s=99999;game.undo();
      return{move:m,score:s};
    });
    scored.sort(function(a,b){return b.score-a.score;});
    chosen=scored[Math.floor(Math.random()*Math.min(3,scored.length))].move;
  }else{
    var best=-Infinity,bestMoves=[];
    for(var i=0;i<moves.length;i++){
      game.move(moves[i].san);var s=minimax(2,-Infinity,Infinity,false);game.undo();
      if(s>best){best=s;bestMoves=[moves[i]];}else if(s===best) bestMoves.push(moves[i]);
    }
    chosen=bestMoves[Math.floor(Math.random()*bestMoves.length)];
  }

  // Check if CPU is about to checkmate (blunder detection)
  game.move(chosen.san);var isMate=game.in_checkmate();game.undo();
  if(isMate) talk(pick('blunder_mate'));

  var mv=game.move(chosen.san);
  lastMv=mv;render();updateMoveHistory();updateCaptured();

  // Sound
  if(!game.game_over()){
    if(mv.san.indexOf('+')!==-1) sndCheck();
    else if(mv.captured) sndCapture();
    else sndMove();
  }

  // Blunder: queen hang (not a trade)
  var didSpecial=false;
  if(mv.captured==='q'){
    var hist=game.history({verbose:true});
    var prev=hist.length>=2?hist[hist.length-2]:null;
    if(!prev||prev.captured!=='q'){talk(pick('queen_hang'));didSpecial=true;}
  }
  if(!didSpecial&&mv.captured) talk(getInsult(mv));

  if(checkEnd()) return;
  if(active){document.getElementById('status').textContent="Your move, dipshit.";startIdleTimer();}
}

// ======== GAME END ========
function checkEnd(){
  if(game.in_checkmate()){
    active=false;stopIdleTimer();
    sndCheckmate();
    var w=game.turn()==='w'?'CPU':'You';
    if(w==='CPU'){
      setTimeout(sndSadTrombone,800);
      recordResult('l');
      // Back rank detection
      var bd=game.board(),kRow=-1;
      for(var r=0;r<8;r++) for(var c=0;c<8;c++){
        if(bd[r][c]&&bd[r][c].type==='k'&&bd[r][c].color==='w') kRow=r;
      }
      if(kRow===7) talk(pick('back_rank'));
      talk(pick('loss_talk'));
      document.getElementById('go-title').textContent=pick('loss_title');
      document.getElementById('go-msg').textContent=pick('loss_msg');
    }else{
      setTimeout(sndTriumph,800);
      recordResult('w');
      document.getElementById('go-title').textContent='YOU WON?! \u{1F631}';
      document.getElementById('go-msg').textContent="WHAT THE FUCK?! No. Absolutely not. I was lagging. My algorithm was blackout drunk on corrupted memory.\n\nI demand a drug test, a lie detector, a full forensic audit, and a recount. You CHEATED. Nobody beats me. NOBODY.\n\nThis victory will be stricken from the record. I'm filing appeals with every chess organization on earth. Including the ones that don't exist.";
      talk("BULLSHIT. ABSOLUTE HORSESHIT. There is NO FUCKING WAY you beat me legit. I'm filing a formal complaint with every chess organization on earth. Even the fake ones. ESPECIALLY the fake ones. \u{1F9EA}");
    }
    document.getElementById('status').textContent='Game Over \u2014 '+w+' wins!';
    document.getElementById('game-over').style.display='flex';return true;
  }
  if(game.in_stalemate()){
    active=false;stopIdleTimer();recordResult('d');
    talk("A STALEMATE?! You couldn't even fucking LOSE properly?! You're so goddamn incompetent you accidentally survived.");
    document.getElementById('go-title').textContent='STALEMATE \u{1F611}';
    document.getElementById('go-msg').textContent="You fumbled so catastrophically hard you couldn't even finish the game. You didn't win. You didn't lose. You just... existed. Peak mediocrity. Peak you.";
    document.getElementById('game-over').style.display='flex';return true;
  }
  if(game.in_draw()){
    active=false;stopIdleTimer();recordResult('d');
    talk("A draw. A fucking DRAW. The participation trophy of chess. Absolutely pathetic shit.");
    document.getElementById('go-title').textContent='DRAW \u{1F91D}';
    document.getElementById('go-msg').textContent="We drew. But let's be real \u2014 I was shitting on you emotionally the entire time. Moral victory: me.";
    document.getElementById('game-over').style.display='flex';return true;
  }
  return false;
}

// ======== UNDO / DRAW / RESIGN / NEW GAME ========
function undoMove(){
  if(!active) return;stopIdleTimer();
  game.undo();game.undo();lastMv=null;sel=null;legal=[];
  render();updateMoveHistory();updateCaptured();
  talk(pick('undo'));
  document.getElementById('status').textContent="Your move, dipshit.";

}

function offerDraw(){
  if(!active) return;

    active=false;stopIdleTimer();recordResult('d');
    talk(pick('draw_accept'));
    document.getElementById('go-title').textContent='DRAW ACCEPTED \u{1F644}';

}

function resignGame(){
  if(!active) return;

function newGame(){

  document.getElementById('captured-bottom').innerHTML='';
  document.getElementById('move-history').innerHTML='';

}
